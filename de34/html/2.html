<h2>おみくじルーレット</h2>
<p>私のペアは明るさのセンサとモーターを利用しておみくじルーレットを作った</p>
<h2>仕組み</h2>
<p>明るさセンサが一定の数値を下回ったときにモーターが回転しルーレットが回る。<br>
そして一定の数値が上回ったときにモーターの回転が緩やかになりゆっくり止まる。</p>
